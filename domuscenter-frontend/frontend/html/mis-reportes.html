<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>DomusCenter – Mis Reportes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background:#f4f7fb; color:#0b2340; }
    .card-reporte { background:#ffffff; border:1px solid rgba(11,35,64,.08); border-radius:10px; transition:border-color .2s; box-shadow: 0 2px 10px -4px rgba(11,35,64,.07); }
    .card-reporte:hover { border-color:#0d9488; }
    .badge-estado { padding:5px 12px; border-radius:20px; font-size:.78rem; font-weight:600; }
    .estado-pendiente { background:rgba(239,68,68,.15); color:#dc2626; }
    .estado-proceso   { background:rgba(245,158,11,.15); color:#d97706; }
    .estado-resuelto  { background:rgba(34,197,94,.15);  color:#16a34a; }
    .estado-cerrado   { background:rgba(148,163,184,.15);color:#94a3b8; }
    .estado-rechazado { background:rgba(239,68,68,.2);   color:#ef4444; }
  </style>
</head>
<body>



<div class="container-fluid px-4 py-4">
  <div id="alerta" style="display:none;position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:9999;min-width:320px;"></div>

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <div>
      <h4 class="fw-bold mb-0"><i class="bi bi-file-earmark-text me-2 text-danger"></i>Mis Reportes</h4>
      <small class="text-secondary">Seguimiento de las incidencias que has reportado</small>
    </div>
    <a href="registrar.html" class="btn btn-danger btn-sm px-3">
      <i class="bi bi-plus-circle me-2"></i>Nueva incidencia
    </a>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card-reporte p-3 text-center">
        <div class="fs-2 fw-bold" id="totalReportes">—</div>
        <div class="text-secondary small">Total reportes</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card-reporte p-3 text-center">
        <div class="fs-2 fw-bold text-warning" id="pendientesCount">—</div>
        <div class="text-secondary small">Pendientes</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card-reporte p-3 text-center">
        <div class="fs-2 fw-bold text-info" id="procesoCount">—</div>
        <div class="text-secondary small">En proceso</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card-reporte p-3 text-center">
        <div class="fs-2 fw-bold text-success" id="resueltosCount">—</div>
        <div class="text-secondary small">Resueltos</div>
      </div>
    </div>
  </div>

  <div class="d-flex gap-2 mb-4 flex-wrap">
    <button onclick="filtrarPor('')"           id="filtroTodos"      class="btn btn-sm btn-danger px-3">Todos</button>
    <button onclick="filtrarPor('Pendiente')"  id="filtroPendiente"  class="btn btn-sm btn-outline-secondary px-3">Pendientes</button>
    <button onclick="filtrarPor('En proceso')" id="filtroProceso"    class="btn btn-sm btn-outline-secondary px-3">En proceso</button>
    <button onclick="filtrarPor('Resuelto')"   id="filtroResuelto"   class="btn btn-sm btn-outline-secondary px-3">Resueltos</button>
    <button onclick="filtrarPor('Rechazado')"  id="filtroRechazado"  class="btn btn-sm btn-outline-secondary px-3">Rechazados</button>
  </div>

  <div id="listaReportes">
    <div class="text-center py-5 text-secondary">
      <i class="bi bi-arrow-repeat" style="font-size:2rem;display:block;margin-bottom:8px;"></i>Cargando tus reportes…
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/auth-guard.js"></script>
<script src="./js/sidebar.js"></script>
<script src="./js/mis-reportes.js"></script>

<script>document.addEventListener("DOMContentLoaded",()=>initSidebar("mis-reportes"));</script>
</body>
</html>
