<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="icon" type="image/png" href="../img/logo_domus_center.png">
  <title>DomusCenter – Mensajes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    #chatWrap {
      display: flex;
      height: calc(100vh - 110px);
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(11,35,64,.08);
    }
    /* ── Columna de conversaciones ── */
    #listaConversaciones {
      width: 320px;
      min-width: 320px;
      border-right: 1px solid rgba(11,35,64,.08);
      display: flex;
      flex-direction: column;
      background: #f8fafc;
    }
    .conv-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(11,35,64,.05);
      transition: background .12s;
    }
    .conv-item:hover { background: #eef4f8; }
    .conv-item.active { background: #e0f2f1; }
    .conv-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: #0b2340; color: #fff; display: flex;
      align-items: center; justify-content: center;
      font-weight: 700; font-size: .9rem; flex-shrink: 0;
      position: relative;
    }
    .avatar-media {
      width: 100%; height: 100%; border-radius: 50%; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .conv-avatar .dot-online {
      position: absolute; bottom: -1px; right: -1px;
      width: 11px; height: 11px; border-radius: 50%;
      background: #22c55e; border: 2px solid #f8fafc;
    }
    .conv-nombre { font-weight: 600; font-size: .88rem; color: #0b2340; }
    .conv-preview { font-size: .78rem; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 190px; }
    .conv-hora { font-size: .68rem; color: #94a3b8; white-space: nowrap; }
    .conv-badge {
      background: #dc2626; color: #fff; border-radius: 10px;
      font-size: .68rem; padding: 1px 6px; font-weight: 700;
    }

    /* ── Columna del chat ── */
    #panelChat { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    #chatVacio { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; color:#94a3b8; }
    #chatActivo { min-height: 0; }
    #chatHeader {
      padding: 12px 18px; border-bottom: 1px solid rgba(11,35,64,.08);
      flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
    }
    #mensajesScroll {
      flex: 1; min-height: 0; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 8px;
      background: #f4f7fb;
    }
    .msg-burbuja {
      max-width: 62%; padding: 9px 13px; border-radius: 14px; font-size: .87rem; line-height: 1.35;
      word-wrap: break-word;
    }
    .msg-mio { align-self: flex-end; background: #0d9488; color: #fff; border-bottom-right-radius: 3px; }
    .msg-otro { align-self: flex-start; background: #fff; color: #0b2340; border: 1px solid rgba(11,35,64,.08); border-bottom-left-radius: 3px; }
    .msg-hora { font-size: .65rem; opacity: .7; margin-top: 3px; display: block; text-align: right; }
    #formEnviar { padding: 12px 16px; border-top: 1px solid rgba(11,35,64,.08); display: flex; gap: 10px; flex-shrink: 0; }

    /* ── Modal directorio ── */
    .dir-item { display:flex; align-items:center; gap:10px; padding:10px 8px; border-radius:8px; cursor:pointer; }
    .dir-item:hover { background:#eef4f8; }
  </style>
</head>
<body>

<div id="alerta" class="position-fixed top-0 end-0 p-3" style="z-index:9999;display:none;"></div>

<!-- Modal: nueva conversación -->
<div class="modal fade" id="modalNuevoChat" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0" style="border-radius:16px;">
      <div class="modal-header" style="border-bottom:1px solid rgba(11,35,64,.08);">
        <h6 class="modal-title fw-bold"><i class="bi bi-chat-dots me-2 text-danger"></i>Nuevo mensaje</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="text" id="buscarDirectorioInput" class="form-control border-secondary mb-3" style="background:#f4f7fb;" placeholder="Buscar por nombre o correo…">
        <div id="listaDirectorio" style="max-height:340px; overflow-y:auto;">
          <div class="text-center text-secondary py-4"><i class="bi bi-arrow-repeat me-1"></i>Cargando…</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid px-4 py-4" style="background:#f4f7fb;min-height:100vh;">

  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <div>
      <h4 class="fw-bold mb-0"><i class="bi bi-chat-dots me-2 text-danger"></i>Mensajes</h4>
      <small class="text-secondary">Chatea con cualquier persona de DomusCenter</small>
    </div>
    <button class="btn btn-danger btn-sm px-3" data-bs-toggle="modal" data-bs-target="#modalNuevoChat" onclick="abrirDirectorio()">
      <i class="bi bi-plus-circle me-2"></i>Nuevo mensaje
    </button>
  </div>

  <div id="chatWrap">
    <div id="listaConversaciones">
      <div style="padding:10px 12px; border-bottom:1px solid rgba(11,35,64,.08);">
        <input type="text" id="buscarConversacionInput" class="form-control form-control-sm border-secondary" style="background:#fff;" placeholder="Buscar conversación…">
      </div>
      <div id="listaConversacionesBody" style="flex:1; overflow-y:auto;">
        <div class="text-center text-secondary py-5"><i class="bi bi-arrow-repeat me-1"></i>Cargando…</div>
      </div>
    </div>

    <div id="panelChat">
      <div id="chatVacio">
        <i class="bi bi-chat-square-text" style="font-size:2.6rem;"></i>
        <p class="mt-2 mb-0">Selecciona una conversación o inicia una nueva</p>
      </div>

      <div id="chatActivo" style="display:none; flex:1; flex-direction:column;">
        <div id="chatHeader">
          <div class="conv-avatar" id="chatAvatarOtro" style="width:38px;height:38px;font-size:.8rem;"></div>
          <div>
            <div class="fw-semibold small" id="chatNombreOtro" style="color:#0b2340;"></div>
            <div class="small" id="chatEstadoOtro" style="color:#94a3b8;font-size:.72rem;"></div>
          </div>
        </div>
        <div id="mensajesScroll"></div>
        <form id="formEnviar" onsubmit="enviarMensaje(event)">
          <input type="text" id="inputMensaje" class="form-control border-secondary" style="background:#f4f7fb;" placeholder="Escribe un mensaje…" autocomplete="off">
          <button type="submit" class="btn btn-danger px-3"><i class="bi bi-send-fill"></i></button>
        </form>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://js.pusher.com/8.4/pusher.min.js"></script>
<script src="./js/auth-guard.js"></script>
<script src="./js/sidebar.js"></script>
<script src="./js/mensajes.js"></script>

<script>document.addEventListener("DOMContentLoaded",()=>initSidebar("mensajes"));</script>
</body>
</html>
