<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="icon" type="image/png" href="../img/logo_domus_center.png">
  <title>DomusCenter – Mensajes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    /* ── Esta página ocupa exactamente el alto visible, sin números
       adivinados: el topbar y el título toman su alto natural, y el
       chat se estira con flexbox para llenar lo que sobra. Todo el
       scroll queda contenido DENTRO del chat, la página en sí no
       hace scroll. ── */
    #gi-main:has(#chatWrap) {
      height: 100vh;
      height: 100dvh; /* más confiable en celulares (barra de direcciones) */
      overflow: hidden;
    }
    #gi-main:has(#chatWrap) > .container-fluid {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #chatWrap {
      flex: 1;
      min-height: 0;
      display: flex;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(11,35,64,.08);
      box-shadow: 0 8px 28px rgba(11,35,64,.07);
    }
    /* ── Columna de conversaciones ── */
    #listaConversaciones {
      width: 330px;
      min-width: 330px;
      border-right: 1px solid rgba(11,35,64,.08);
      display: flex;
      flex-direction: column;
      background: #fbfcfe;
    }
    #buscarConversacionInput {
      border-radius: 20px !important;
      padding-left: 14px;
    }
    #listaConversacionesBody { scrollbar-width: thin; scrollbar-color: rgba(11,35,64,.15) transparent; }
    #listaConversacionesBody::-webkit-scrollbar { width: 6px; }
    #listaConversacionesBody::-webkit-scrollbar-thumb { background: rgba(11,35,64,.15); border-radius: 10px; }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 12px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .12s, border-color .12s;
    }
    .conv-item:hover { background: #f1f6f8; }
    .conv-item.active { background: #e6f6f4; border-left-color: #0d9488; }
    .conv-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #123a63, #0b2340);
      color: #fff; display: flex;
      align-items: center; justify-content: center;
      font-weight: 700; font-size: .88rem; flex-shrink: 0;
      position: relative;
      box-shadow: 0 2px 6px rgba(11,35,64,.18);
    }
    .avatar-media {
      width: 100%; height: 100%; border-radius: 50%; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .conv-avatar .dot-online {
      position: absolute; bottom: -1px; right: -1px;
      width: 12px; height: 12px; border-radius: 50%;
      background: #22c55e; border: 2.5px solid #fbfcfe;
    }
    .conv-nombre { font-weight: 600; font-size: .88rem; color: #0b2340; }
    .conv-preview { font-size: .78rem; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 190px; }
    .conv-hora { font-size: .68rem; color: #94a3b8; white-space: nowrap; }
    .conv-badge {
      background: #dc2626; color: #fff; border-radius: 10px;
      font-size: .68rem; padding: 1px 6px; font-weight: 700;
      min-width: 18px; text-align: center;
      box-shadow: 0 1px 4px rgba(220,38,38,.4);
    }

    /* ── Columna del chat ── */
    #panelChat { flex: 1; display: flex; flex-direction: column; min-height: 0; min-width: 0; background: #f7f9fc; }
    #chatVacio { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; color:#94a3b8; gap:4px; }
    #chatVacio i { color: #cbd5e1; }
    #chatActivo { min-height: 0; }
    #btnVolverLista { display: none; background: none; border: none; font-size: 1.2rem; color: #0b2340; padding: 4px 8px 4px 0; }
    #chatHeader {
      padding: 12px 20px; border-bottom: 1px solid rgba(11,35,64,.08);
      flex-shrink: 0; background: #fff;
      display: flex; align-items: center; gap: 10px;
      transition: background .12s;
    }
    #chatHeader:hover { background: #fafcfe; }
    #mensajesScroll {
      flex: 1; min-height: 0; overflow-y: auto; padding: 20px 22px; display: flex; flex-direction: column; gap: 3px;
      background: #f7f9fc;
      scrollbar-width: thin; scrollbar-color: rgba(11,35,64,.15) transparent;
    }
    #mensajesScroll::-webkit-scrollbar { width: 6px; }
    #mensajesScroll::-webkit-scrollbar-thumb { background: rgba(11,35,64,.15); border-radius: 10px; }
    .msg-burbuja {
      max-width: 60%; padding: 10px 14px; border-radius: 16px; font-size: .87rem; line-height: 1.4;
      word-wrap: break-word;
      transition: opacity .15s;
      margin: 3px 0;
      box-shadow: 0 1px 2px rgba(11,35,64,.06);
    }
    .msg-mio { align-self: flex-end; background: linear-gradient(135deg, #0d9488, #0f766e); color: #fff; border-bottom-right-radius: 4px; }
    .msg-otro { align-self: flex-start; background: #fff; color: #0b2340; border: 1px solid rgba(11,35,64,.06); border-bottom-left-radius: 4px; }
    .msg-hora { font-size: .65rem; opacity: .8; margin-top: 4px; display: flex; align-items:center; gap:4px; justify-content: flex-end; }
    .msg-check { font-size: .8rem; }
    .msg-check.leido { color: #67e8f9; }
    .msg-imagen { max-width: 220px; border-radius: 12px; display: block; cursor: pointer; margin-bottom: 3px; }
    .msg-burbuja mark { background: #fde047; color: #0b2340; border-radius: 2px; padding: 0 1px; }
    .msg-burbuja.msg-atenuado { opacity: .35; }
    .msg-burbuja.msg-resaltado-actual { outline: 2px solid #f59e0b; }

    #formEnviar {
      padding: 14px 18px; border-top: 1px solid rgba(11,35,64,.08); background: #fff;
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    #formEnviar #inputMensaje {
      border-radius: 22px !important;
      background: #f4f7fb !important;
      border-color: transparent !important;
      padding: 10px 18px;
    }
    #formEnviar #inputMensaje:focus {
      box-shadow: 0 0 0 3px rgba(13,148,136,.15) !important;
      background: #fff !important;
    }
    #formEnviar button[type="button"] {
      border-radius: 50% !important; width: 40px; height: 40px; padding: 0 !important;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      border-color: rgba(11,35,64,.12) !important; color: #64748b !important;
    }
    #formEnviar button[type="submit"] {
      border-radius: 50% !important; width: 42px; height: 42px; padding: 0 !important;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      background: linear-gradient(135deg, #ef4444, #dc2626) !important; border: none !important;
      box-shadow: 0 3px 8px rgba(220,38,38,.35);
      transition: transform .1s;
    }
    #formEnviar button[type="submit"]:active { transform: scale(.92); }

    .btn-icono-header {
      background: none; border: none; color: #64748b; font-size: 1.05rem;
      padding: 7px 9px; border-radius: 10px; flex-shrink: 0;
      transition: background .12s, color .12s;
    }
    .btn-icono-header:hover { background: #eef4f8; color: #0d9488; }

    #barraBusquedaMensajes {
      display: flex; align-items: center; gap: 6px; padding: 8px 16px;
      border-bottom: 1px solid rgba(11,35,64,.08); background: #fffbea; flex-shrink: 0;
    }
    #barraBusquedaMensajes input {
      flex: 1; border: 1px solid rgba(11,35,64,.15); border-radius: 20px; padding: 6px 14px; font-size: .82rem; background:#fff;
    }
    #barraBusquedaMensajes button {
      background: none; border: none; color: #64748b; padding: 4px 6px; border-radius: 6px;
    }
    #barraBusquedaMensajes button:hover { background: rgba(11,35,64,.06); }

    #indicadorEscribiendo {
      padding: 6px 22px; font-size: .78rem; color: #0d9488; font-style: italic; flex-shrink: 0;
      background: #f7f9fc;
    }

    /* ── Modal directorio ── */
    .dir-item { display:flex; align-items:center; gap:10px; padding:10px 10px; border-radius:10px; cursor:pointer; transition: background .12s; }
    .dir-item:hover { background:#f1f6f8; }

    /* ════════════════════════════════════════════════════════
       CELULAR: layout de 1 sola columna, tipo WhatsApp Web.
       Por defecto se ve la lista de chats a pantalla completa;
       al abrir una conversación, se oculta la lista y se muestra
       el chat a pantalla completa con un botón "←" para volver.
    ════════════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      .container-fluid.px-4.py-4:has(#chatWrap) { padding: 10px !important; }
      #chatWrap { border-radius: 12px; }
      #listaConversaciones { width: 100%; min-width: 100%; }
      #panelChat { display: none; }
      .conv-preview { max-width: 55vw; }

      #chatWrap.chat-abierto-movil #listaConversaciones { display: none; }
      #chatWrap.chat-abierto-movil #panelChat { display: flex; }

      #btnVolverLista { display: inline-flex; align-items: center; }
      .msg-burbuja { max-width: 82%; }
    }
  </style>
</head>
<body>

<div id="alerta" class="position-fixed top-0 end-0 p-3" style="z-index:9999;display:none;"></div>

<!-- Modal: nueva conversación -->
<div class="modal fade" id="modalNuevoChat" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0" style="border-radius:16px;">
      <div class="modal-header" style="border-bottom:1px solid rgba(11,35,64,.08);">
        <h6 class="modal-title fw-bold"><i class="bi bi-chat-dots me-2 text-danger"></i>Nuevo mensaje</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="text" id="buscarDirectorioInput" class="form-control border-secondary mb-3" style="background:#f4f7fb;" placeholder="Buscar por nombre o correo…">
        <div id="listaDirectorio" style="max-height:340px; overflow-y:auto;">
          <div class="text-center text-secondary py-4"><i class="bi bi-arrow-repeat me-1"></i>Cargando…</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: perfil del contacto (estilo Messenger) -->
<div class="modal fade" id="modalPerfilContacto" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0" style="border-radius:16px;">
      <div class="modal-header" style="border-bottom:1px solid rgba(11,35,64,.08);">
        <h6 class="modal-title fw-bold">Info del contacto</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center py-4">
        <div id="perfilContactoAvatar" class="mx-auto mb-3" style="width:96px;height:96px;border-radius:50%;background:#0b2340;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.8rem;overflow:hidden;"></div>
        <h5 class="fw-bold mb-0" id="perfilContactoNombre" style="color:#0b2340;"></h5>
        <div class="mb-3">
          <span class="badge" id="perfilContactoEstado" style="background:#94a3b8;"></span>
        </div>
        <div class="text-start border-top pt-3" style="border-color:rgba(11,35,64,.08) !important;">
          <div class="mb-2">
            <div class="small text-secondary">Rol</div>
            <div class="fw-semibold" id="perfilContactoRol" style="color:#0b2340;"></div>
          </div>
          <div class="mb-2">
            <div class="small text-secondary">Correo</div>
            <div class="fw-semibold" id="perfilContactoCorreo" style="color:#0b2340;"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer" style="border-top:1px solid rgba(11,35,64,.08);">
        <button type="button" class="btn btn-outline-danger btn-sm" data-bs-dismiss="modal" onclick="abrirModalReportar()">
          <i class="bi bi-flag me-2"></i>Reportar usuario
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: reportar/denunciar usuario -->
<div class="modal fade" id="modalReportarUsuario" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0" style="border-radius:16px;">
      <div class="modal-header" style="border-bottom:1px solid rgba(11,35,64,.08);">
        <h6 class="modal-title fw-bold text-danger"><i class="bi bi-flag me-2"></i>Reportar a <span id="reportarNombreUsuario"></span></h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="small text-secondary">Cuéntanos qué pasó. El equipo de administración va a revisar tu reporte.</p>
        <label class="form-label text-secondary small text-uppercase">Motivo *</label>
        <select id="reportarMotivo" class="form-select border-secondary mb-3" style="background:#f4f7fb;">
          <option value="acoso">Acoso u hostigamiento</option>
          <option value="spam">Spam o publicidad no deseada</option>
          <option value="contenido_inapropiado">Contenido inapropiado</option>
          <option value="comportamiento_sospechoso">Comportamiento sospechoso</option>
          <option value="otro">Otro motivo</option>
        </select>
        <label class="form-label text-secondary small text-uppercase">Detalles (opcional)</label>
        <textarea id="reportarDescripcion" class="form-control border-secondary" style="background:#f4f7fb;" rows="3" maxlength="1000" placeholder="Explica brevemente qué pasó…"></textarea>
        <div id="msgReportarUsuario" class="alert py-2 small mt-3" style="display:none;"></div>
      </div>
      <div class="modal-footer" style="border-top:1px solid rgba(11,35,64,.08);">
        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-danger btn-sm" id="btnConfirmarReportar" onclick="confirmarReportarUsuario()">
          <i class="bi bi-send me-2"></i>Enviar reporte
        </button>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid px-4 py-4" style="background:#f4f7fb;">

  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <div>
      <h4 class="fw-bold mb-0"><i class="bi bi-chat-dots me-2 text-danger"></i>Mensajes</h4>
      <small class="text-secondary">Chatea con cualquier persona de DomusCenter</small>
    </div>
    <button class="btn btn-danger btn-sm px-3 rounded-pill" data-bs-toggle="modal" data-bs-target="#modalNuevoChat" onclick="abrirDirectorio()" style="box-shadow:0 3px 10px rgba(220,38,38,.3);">
      <i class="bi bi-plus-circle me-2"></i>Nuevo mensaje
    </button>
  </div>

  <div id="chatWrap">
    <div id="listaConversaciones">
      <div style="padding:10px 12px; border-bottom:1px solid rgba(11,35,64,.08);">
        <input type="text" id="buscarConversacionInput" class="form-control form-control-sm border-secondary" style="background:#fff;" placeholder="Buscar conversación…">
      </div>
      <div id="listaConversacionesBody" style="flex:1; overflow-y:auto;">
        <div class="text-center text-secondary py-5"><i class="bi bi-arrow-repeat me-1"></i>Cargando…</div>
      </div>
    </div>

    <div id="panelChat">
      <div id="chatVacio">
        <i class="bi bi-chat-square-text" style="font-size:2.6rem;"></i>
        <p class="mt-2 mb-0">Selecciona una conversación o inicia una nueva</p>
      </div>

      <div id="chatActivo" style="display:none; flex:1; flex-direction:column;">
        <div id="chatHeader">
          <button id="btnVolverLista" type="button" onclick="volverAListaMovil(event)" title="Volver">
            <i class="bi bi-arrow-left"></i>
          </button>
          <div style="cursor:pointer; display:flex; align-items:center; gap:10px; flex:1; min-width:0;" onclick="verPerfilContacto()" title="Ver info del contacto">
            <div class="conv-avatar" id="chatAvatarOtro" style="width:38px;height:38px;font-size:.8rem;"></div>
            <div style="min-width:0;">
              <div class="fw-semibold small text-truncate" id="chatNombreOtro" style="color:#0b2340;"></div>
              <div class="small" id="chatEstadoOtro" style="color:#94a3b8;font-size:.72rem;"></div>
            </div>
          </div>
          <button type="button" class="btn-icono-header" onclick="toggleBusquedaMensajes(event)" title="Buscar en la conversación">
            <i class="bi bi-search"></i>
          </button>
        </div>

        <div id="barraBusquedaMensajes" style="display:none;">
          <input type="text" id="inputBuscarMensajes" placeholder="Buscar en esta conversación…" autocomplete="off">
          <span id="contadorBusqueda" class="small text-secondary"></span>
          <button type="button" onclick="irResultadoBusqueda(-1)" title="Anterior"><i class="bi bi-chevron-up"></i></button>
          <button type="button" onclick="irResultadoBusqueda(1)" title="Siguiente"><i class="bi bi-chevron-down"></i></button>
          <button type="button" onclick="cerrarBusquedaMensajes()" title="Cerrar"><i class="bi bi-x-lg"></i></button>
        </div>

        <div id="mensajesScroll"></div>
        <div id="indicadorEscribiendo" style="display:none;"><i class="bi bi-three-dots"></i> escribiendo…</div>

        <form id="formEnviar" onsubmit="enviarMensaje(event)">
          <input type="file" id="inputImagenChat" accept="image/*" style="display:none;" onchange="enviarImagenChat(event)">
          <button type="button" class="btn btn-outline-secondary px-3" onclick="document.getElementById('inputImagenChat').click()" title="Adjuntar imagen">
            <i class="bi bi-image"></i>
          </button>
          <input type="text" id="inputMensaje" class="form-control border-secondary" style="background:#f4f7fb;" placeholder="Escribe un mensaje…" autocomplete="off" oninput="notificarEscribiendo()">
          <button type="submit" class="btn btn-danger px-3"><i class="bi bi-send-fill"></i></button>
        </form>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://js.pusher.com/8.4/pusher.min.js"></script>
<script src="./js/auth-guard.js"></script>
<script src="./js/sidebar.js"></script>
<script src="./js/mensajes.js"></script>

<script>document.addEventListener("DOMContentLoaded",()=>initSidebar("mensajes"));</script>
</body>
</html>
