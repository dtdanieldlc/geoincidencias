<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="icon" type="image/png" href="../img/logo_domus_center.png">
  <title>DomusCenter – Verificar Correo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root { --accent: #dc2626; }
    body {
      background: #f4f7fb; color: #0b2340; min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    .card-verif {
      background: #ffffff;
      border: 1px solid rgba(11,35,64,.08);
      border-radius: 14px;
      padding: 40px 36px;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 50px -20px rgba(11,35,64,.18);
    }
    .icon-wrap {
      width:64px; height:64px; border-radius:50%;
      background: #e3f7f4;
      display:flex; align-items:center; justify-content:center;
      margin: 0 auto 20px;
      font-size:1.8rem; color:#0d9488;
    }
    h1 { font-size:1.3rem; font-weight:700; text-align:center; margin-bottom:6px; }
    .sub {
      text-align:center; color:#64748b;
      font-size:.88rem; margin-bottom:28px; line-height:1.5;
    }
    .correo-pill {
      background:#eef4f8; border:1px solid rgba(88,166,255,.2);
      color:#0d9488; padding:4px 12px; border-radius:20px;
      font-size:.82rem; font-weight:600;
    }

    /* ── Inputs de código ── */
    .code-inputs { display:flex; gap:10px; justify-content:center; margin-bottom:28px; }
    .code-inputs input {
      width:48px; height:56px;
      text-align:center; font-size:1.5rem; font-weight:700;
      background:#f4f7fb; color:#0b2340;
      border:2px solid rgba(139,148,158,.3); border-radius:10px;
      outline:none; transition:border .15s;
    }
    .code-inputs input:focus           { border-color:#0d9488; }
    .code-inputs input.filled          { border-color:#0d9488; background:#e3f7f4; }
    .code-inputs input.input-error     { border-color:#dc2626; animation: shake .3s ease; }
    @keyframes shake {
      0%,100% { transform:translateX(0); }
      25%      { transform:translateX(-5px); }
      75%      { transform:translateX(5px); }
    }

    .btn-verificar {
      width:100%; padding:12px; border:none; border-radius:10px;
      background:#238636; color:#fff; font-size:.95rem; font-weight:600;
      cursor:pointer; transition:background .15s;
    }
    .btn-verificar:hover:not(:disabled) { background:#2ea043; }
    .btn-verificar:disabled             { opacity:.5; cursor:default; }

    .btn-reenviar {
      background:none; border:none; color:#0d9488;
      font-size:.83rem; cursor:pointer; padding:0; text-decoration:underline;
    }
    .btn-reenviar:disabled { opacity:.4; cursor:default; text-decoration:none; }

    .msg { padding:10px 14px; border-radius:8px; font-size:.85rem; margin-bottom:16px; text-align:center; }
    .msg.error   { background:#fbe9e9; color:#dc2626; border:1px solid #dc262626; }
    .msg.success { background:#e6f8ee; color:#16a34a; border:1px solid #2ea04326; }
    .msg.warning { background:#fef3e0; color:#d97706; border:1px solid #d9770626; }
  </style>
</head>
<body>

<div class="card-verif">
  <div class="icon-wrap"><i class="bi bi-envelope-check"></i></div>
  <h1>Verifica tu correo</h1>
  <p class="sub">
    Enviamos un código de 6 dígitos a<br/>
    <span class="correo-pill" id="correoDestino">—</span><br/>
    Ingresa el código para activar tu cuenta.
  </p>

  <div id="msgBox" style="display:none;" class="msg"></div>

  <!-- Inputs del código -->
  <div class="code-inputs" id="codeInputs">
    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit" data-i="0" autocomplete="one-time-code"/>
    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit" data-i="1"/>
    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit" data-i="2"/>
    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit" data-i="3"/>
    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit" data-i="4"/>
    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit" data-i="5"/>
  </div>

  <button class="btn-verificar mb-3" id="btnVerificar">
    <span id="btnVerificarTxt">Verificar código</span>
  </button>

  <div class="text-center mt-2">
    <span style="font-size:.82rem;color:#64748b;">¿No recibiste el código? </span>
    <button class="btn-reenviar" id="btnReenviar">Reenviar</button>
    <span id="reenviarTimer" style="font-size:.78rem;color:#64748b;display:none;">
      (<span id="timerSeg">60</span>s)
    </span>
  </div>

  <div class="text-center mt-3">
    <a href="login.html" style="font-size:.8rem;color:#64748b;text-decoration:none;">
      <i class="bi bi-arrow-left me-1"></i>Volver al inicio de sesión
    </a>
  </div>
</div>

<script src="./js/verificar-correo.js"></script>
</body>
</html>
