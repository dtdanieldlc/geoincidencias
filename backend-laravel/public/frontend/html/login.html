<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>GeoIncidencias – Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-dark text-white d-flex align-items-center" style="min-height:100vh;background:#0d1117;">

<div id="alerta" class="position-fixed top-0 end-0 p-3" style="z-index:9999;display:none;"></div>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-6 col-lg-4">

      <div class="text-center mb-4">
        <span class="badge bg-danger rounded-circle p-3 mb-2" style="width:64px;height:64px;display:inline-flex;align-items:center;justify-content:center;overflow:hidden;">
          <img src="/logo_Domus_Center.png" alt="" style="width:100%;height:100%;object-fit:contain;" onerror="this.style.display='none';this.nextElementSibling.style.display='inline-block';">
          <i class="bi bi-geo-alt-fill fs-4" style="display:none;"></i>
        </span>
        <h3 class="fw-bold mt-2 mb-0">DOMUS CENTER</h3>
        <small class="text-secondary">Sistema de Gestión de Incidencias</small>
      </div>

      <div class="rounded-3 border border-secondary border-opacity-25 p-4" style="background:#161b22;">

        <!-- Tabs login / registro -->
        <ul class="nav nav-pills nav-fill mb-4" id="tabAuth">
          <li class="nav-item">
            <button class="nav-link active" id="tabLoginBtn" onclick="mostrarTab('login')">Iniciar sesión</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" id="tabRegistroBtn" onclick="mostrarTab('registro')">Crear cuenta</button>
          </li>
        </ul>

        <!-- Formulario LOGIN -->
        <div id="formLogin">
          <div class="mb-3">
            <label class="form-label text-secondary small text-uppercase">Correo</label>
            <input type="email" id="loginCorreo" class="form-control border-secondary text-white" style="background:#0d1117;" placeholder="tucorreo@empresa.com"/>
          </div>
          <div class="mb-3">
            <label class="form-label text-secondary small text-uppercase">Contraseña</label>
            <input type="password" id="loginPassword" class="form-control border-secondary text-white" style="background:#0d1117;" placeholder="••••••••"/>
          </div>
          <div class="d-grid">
            <button id="btnLogin" class="btn btn-danger" onclick="iniciarSesion()">
              <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
            </button>
          </div>
          <p class="text-secondary small text-center mt-3 mb-0">
          </p>
        </div>

        <!-- Formulario REGISTRO -->
        <div id="formRegistro" style="display:none;">
          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label text-secondary small text-uppercase">Nombre</label>
              <input type="text" id="regNombre" class="form-control border-secondary text-white" style="background:#0d1117;"/>
            </div>
            <div class="col-6">
              <label class="form-label text-secondary small text-uppercase">Apellido</label>
              <input type="text" id="regApellido" class="form-control border-secondary text-white" style="background:#0d1117;"/>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label text-secondary small text-uppercase">Correo</label>
            <input type="email" id="regCorreo" class="form-control border-secondary text-white" style="background:#0d1117;"/>
          </div>
          <div class="mb-3">
            <label class="form-label text-secondary small text-uppercase">Teléfono</label>
            <input type="text" id="regTelefono" class="form-control border-secondary text-white" style="background:#0d1117;"/>
          </div>
          <div class="mb-3">
            <label class="form-label text-secondary small text-uppercase">Contraseña</label>
            <input type="password" id="regPassword" class="form-control border-secondary text-white" style="background:#0d1117;" placeholder="Mínimo 6 caracteres"/>
          </div>
          <div class="d-grid">
            <button id="btnRegistro" class="btn btn-outline-light" onclick="crearCuenta()">
              <i class="bi bi-person-plus me-2"></i>Crear cuenta
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/login.js"></script>
</body>
</html>
