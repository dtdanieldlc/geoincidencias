<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>GeoIncidencias – Mi Perfil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    .perfil-avatar { 
      width: 160px; 
      height: 160px; 
      background: #21262d; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 4.5rem; 
      border: 5px solid #343a40;
      overflow: hidden;
    }
    .perfil-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .form-label { color: #adb5bd !important; font-weight: 500; }
    .card { background: #161b22; border-color: #343a40; }
  </style>
</head>
<body>



<div id="alerta" class="position-fixed top-0 end-0 p-3" style="z-index:9999;display:none;"></div>

<div class="container-fluid px-4 py-4" style="background:#0d1117;min-height:100vh;">
  <h4 class="fw-bold mb-1">Mi Perfil</h4>
  <small class="text-secondary">Gestiona tu información personal y seguridad de cuenta</small>

  <div class="row g-4 mt-4">
    <!-- Avatar -->
    <div class="col-lg-4">
      <div class="card h-100 text-center p-4">
        <div class="perfil-avatar mx-auto mb-3 position-relative" id="avatarContainer" style="cursor: pointer;">
          <img id="avatarImg" src="" alt="Avatar" style="display:none; width:100%; height:100%; object-fit:cover;">
          <span id="avatarIcon">👤</span>
          <div class="position-absolute bottom-0 end-0 bg-danger text-white rounded-circle p-1" style="font-size:0.8rem;">
            <i class="bi bi-camera"></i>
          </div>
        </div>
         <input type="file" id="fotoInput" accept="image/*" class="d-none">
        <button onclick="document.getElementById('fotoInput').click()" class="btn btn-outline-light btn-sm">
          <i class="bi bi-camera me-1"></i>Cambiar foto de perfil
        </button>

       <h5 id="nombrePerfil" class="fw-bold mt-3 mb-1"></h5>
       <p id="rolPerfil" class="text-info"></p>

        <div class="mt-4 pt-4 border-top border-secondary">
          <div class="d-flex justify-content-between mb-2">
            <span class="text-secondary">Incentivos</span>
            <span id="saldoIncentivos" class="fw-bold text-success">$0.00</span>
          </div>
          <div class="d-flex justify-content-between">
            <span class="text-secondary">Miembro desde</span>
            <span id="miembroDesde" class="text-secondary">—</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Formulario -->
    <div class="col-lg-8">
      <div class="card">
        <div class="card-header border-secondary">
          <i class="bi bi-person-fill me-2"></i>Información Personal
        </div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Nombre <span class="text-danger">*</span></label>
              <input type="text" id="editNombre" class="form-control bg-dark border-secondary text-white">
            </div>
            <div class="col-md-6">
              <label class="form-label">Apellido</label>
              <input type="text" id="editApellido" class="form-control bg-dark border-secondary text-white">
            </div>
            <div class="col-md-6">
              <label class="form-label">Correo Electrónico <span class="text-danger">*</span></label>
              <input type="email" id="editCorreo" class="form-control bg-dark border-secondary text-white">
            </div>
            <div class="col-md-6">
              <label class="form-label">Teléfono</label>
              <input type="text" id="editTelefono" class="form-control bg-dark border-secondary text-white">
            </div>
          </div>

          <div class="mt-4">
            <button id="btnGuardarPerfil" onclick="guardarPerfil()" class="btn btn-danger">
              <i class="bi bi-save me-2"></i>Guardar cambios
            </button>
            <button onclick="cargarPerfil()" class="btn btn-outline-secondary ms-2">Descartar</button>
          </div>
        </div>
      </div>

      <!-- Cambiar Contraseña -->
      <div class="card mt-4">
        <div class="card-header border-secondary">
          <i class="bi bi-key me-2"></i>Cambiar Contraseña
        </div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Contraseña Actual *</label>
              <div class="input-group">
                <input type="password" id="password_actual" class="form-control bg-dark border-secondary text-white">
                <button class="btn btn-outline-secondary" onclick="togglePass('password_actual')">👁</button>
              </div>
            </div>
            <div class="col-md-4">
              <label class="form-label">Nueva Contraseña *</label>
              <div class="input-group">
                <input type="password" id="password_nuevo" class="form-control bg-dark border-secondary text-white">
                <button class="btn btn-outline-secondary" onclick="togglePass('password_nuevo')">👁</button>
              </div>
            </div>
            <div class="col-md-4">
              <label class="form-label">Confirmar Nueva *</label>
              <div class="input-group">
                <input type="password" id="password_confirm" class="form-control bg-dark border-secondary text-white">
                <button class="btn btn-outline-secondary" onclick="togglePass('password_confirm')">👁</button>
              </div>
            </div>
          </div>
          <button onclick="cambiarPassword()" class="btn btn-outline-danger mt-3">
            Actualizar contraseña
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/auth-guard.js"></script>
<script src="./js/sidebar.js"></script>
<script src="./js/perfil.js"></script>

<script>document.addEventListener("DOMContentLoaded",()=>initSidebar("perfil"));</script>
</body>
</html>
